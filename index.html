<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع الرسمي - د. مادح محمد جادو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --deep-blue: #0d2147;
            --accent-teal: #00c9b1;
            --accent-gold: #d4a843;
            --white: #ffffff;
            --light-bg: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--light-bg); color: #333; line-height: 1.6; }

        header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--deep-blue) 100%);
            color: white;
            padding: 50px 20px;
            text-align: center;
            border-bottom: 5px solid var(--accent-gold);
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--white);
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        header h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
        header .specialty { font-size: 18px; color: var(--accent-teal); font-weight: 700; margin-bottom: 15px; }

        .ramadan-banner {
            background: var(--accent-gold);
            color: var(--navy);
            padding: 10px;
            font-weight: 900;
            font-size: 16px;
            margin-bottom: 30px;
            border-radius: 10px;
        }

        .container { max-width: 850px; margin: -30px auto 40px; padding: 0 20px; }
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border-right: 6px solid var(--accent-teal);
        }

        h2 { color: var(--navy); margin-bottom: 20px; font-size: 20px; font-weight: 900; }
        
        .clinic-info { margin-bottom: 15px; }
        .clinic-info strong { color: var(--deep-blue); display: block; font-size: 18px; margin-bottom: 5px; }
        .clinic-detail { font-size: 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
